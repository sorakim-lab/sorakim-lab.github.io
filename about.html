<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>About · Sora Kim</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta name="description"
content="Sora Kim studies responsibility, accountability, and sociotechnical systems in regulated organizational environments." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f5f5f7;
--panel:#ffffff;
--panel-soft:#fafafa;
--text:#1d1d1f;
--muted:#6e6e73;
--line:#e5e5e7;
--radius:20px;
--shadow:0 12px 34px rgba(0,0,0,0.06);
--mono:'JetBrains Mono', monospace;
--blue:#4da3ff;
--pink:#ff6786;
--purple:#c182ff;
--green:#64d98b;
}

*{box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
}

nav{
position:fixed;
top:18px;
right:18px;
z-index:60;
display:flex;
gap:10px;
padding:10px;
border:1px solid var(--line);
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:999px;
}

nav a{
text-decoration:none;
color:var(--muted);
font-size:14px;
padding:8px 12px;
border-radius:999px;
transition:background 0.2s ease, color 0.2s ease;
}

nav a:hover{
background:rgba(0,0,0,0.035);
color:var(--text);
}

nav a.active{
background:rgba(0,0,0,0.06);
color:var(--text);
}

.wrap{
max-width:1180px;
margin:0 auto;
padding:120px 24px 100px;
}

.header-narrow{
max-width:620px;
}

.kicker{
font-family:var(--mono);
font-size:12px;
color:var(--muted);
margin-bottom:6px;
}

.title{
font-family:'Sora',sans-serif;
font-size:48px;
font-weight:700;
letter-spacing:-0.04em;
margin:0 0 8px 0;
}

.intro{
font-size:15px;
color:rgba(29,29,31,0.84);
margin-bottom:16px;
}

.about-note{
border:1px solid var(--line);
background:rgba(255,255,255,0.75);
border-radius:18px;
box-shadow:var(--shadow);
padding:16px;
margin-bottom:28px;
font-size:13px;
color:rgba(29,29,31,0.74);
max-width:620px;
}
